apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins-master
  namespace: jenkins-master
spec:
  replicas: 1
  selector:
    matchLabels:
      jenkins: master
  template:
    metadata:
      labels:
        jenkins: master
    spec:
      nodeName: devon
      securityContext:
        fsGroup: 1002
        runAsUser: 1002
      serviceAccountName: jenkins-admin
      containers:
        - name: jenkins
          image: jenkins/jenkins:2.559-jdk25
          env:
            - name: JENKINS_JAVA_OPTS
              value: -Djava.awt.headless=true -Dblueocean.collectRuns.threads=80 -XX:MaxRAMPercentage=80.0 -XX:InitialRAMPercentage=50.0 -XX:+AlwaysPreTouch -XX:+DisableExplicitGC -XX:+ExplicitGCInvokesConcurrent -XX:+ParallelRefProcEnabled -XX:+UnlockExperimentalVMOptions -XX:+UseG1GC -XX:+UseStringDeduplication -Dorg.jenkinsci.plugins.durabletask.BourneShellScript.LAUNCH_DIAGNOSTICS=true -Djenkins.InitReactorRunner.concurrency=100 -XX:+UseCompactObjectHeaders -Djdk.xml.maxGeneralEntitySizeLimit=500000 -Djdk.xml.totalEntitySizeLimit=500000
          resources:
            limits:
              memory: "26Gi"
              cpu: "8"
            requests:
              memory: "24Gi"
              cpu: "6"
          ports:
            - name: httpport
              containerPort: 8080
            - name: jnlpport
              containerPort: 7777
          volumeMounts:
            - name: jenkins-data
              mountPath: /var/jenkins_home/
      volumes:
        - name: jenkins-data
          persistentVolumeClaim:
            claimName: task-pv-claim-jenkins
