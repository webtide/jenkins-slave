apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: jesse@webtide.com,olamy@webtide.com
    server: https://acme-v02.api.letsencrypt.org/directory
    # This is the secret we created in Step 2.1
    privateKeySecretRef:
      name: letsencrypt-account-key
    solvers:
    - http01:
        ingress:
          class: public
