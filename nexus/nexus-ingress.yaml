apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-ingress
  namespace: nexus
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/redirect-entry-point: https
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - repository.webtide.net
    secretName: nexus-webtide-tls
  rules:
  - host: repository.webtide.net
    http:
      paths:
      # Allow access to release-staging repository (most specific first)
      - path: /repository/release-staging/
        pathType: Prefix
        backend:
          service:
            name: nexus-service
            port:
              number: 8081
      # Block all other repository paths
      - path: /repository/
        pathType: Prefix
        backend:
          service:
            name: deny-service
            port:
              number: 80
      # Allow root path and other non-repository paths
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nexus-service
            port:
              number: 8081
